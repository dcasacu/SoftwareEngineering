name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Flutter frontend checks
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: LineUp_FullStack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-pub

      - name: Check code formatting
        run: flutter format --dry-run --set-exit-if-changed .

  # Flutter tests
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: LineUp_FullStack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test --coverage 2>/dev/null || flutter test

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./LineUp_FullStack/coverage/lcov.info
          fail_ci_if_error: false

  # Backend checks
  backend-lint:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: LineUp_FullStack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LineUp_FullStack/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Check for dependency issues
        run: npm audit --audit-level=moderate || true

  # Comprehensive check
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: LineUp_FullStack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LineUp_FullStack/package-lock.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install backend dependencies
        run: npm install

      - name: Verify Flutter build
        run: flutter build web --web-renderer html || echo "Web build skipped (optional)"

  # Final status check
  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [flutter-analyze, flutter-test, backend-lint, build-check]
    if: always()
    
    steps:
      - name: Check CI Results
        run: |
          if [ "${{ needs.flutter-analyze.result }}" = "failure" ] || \
             [ "${{ needs.flutter-test.result }}" = "failure" ] || \
             [ "${{ needs.backend-lint.result }}" = "failure" ] || \
             [ "${{ needs.build-check.result }}" = "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi

  # Notification (optional)
  notify-status:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: ci-status
    if: always()
    
    steps:
      - name: CI Workflow Status
        run: |
          if [ "${{ needs.ci-status.result }}" = "success" ]; then
            echo "✅ All checks passed! Branch is ready for merge."
          else
            echo "❌ Some checks failed. Please review the logs."
          fi

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LineUp — Spend time shopping, not waiting</title>
<meta name="description" content="LineUp is a mobile-first virtual queue app for local markets. Discover shops, join queues from your phone, and skip the wait." />
<style>
  /* =============================x============================
     LineUp — Landing Page
     Design: warm, market-inspired, modern, mobile-first
     ========================================================= */

  :root {
    --bg: #f4f8fc;
    --bg-warm: #fffaf3;
    --surface: #ffffff;
    --ink: #0e1a2b;
    --ink-soft: #3d4d63;
    --muted: #7a8699;
    --line: #dde7f2;
    --primary: #2563eb;       /* LineUp blue */
    --primary-dark: #1d4ed8;
    --primary-soft: #e6efff;
    --secondary: #d96b27;     /* warm terracotta accent */
    --accent: #0ea5e9;        /* sky blue */
    --accent-soft: #e0f2fe;
    --warm: #f6d365;          /* warm yellow accent */
    --warm-soft: #fff3d1;
    --radius: 18px;
    --radius-lg: 28px;
    --shadow-sm: 0 2px 8px rgba(15, 35, 70, .06);
    --shadow: 0 10px 30px rgba(15, 35, 70, .08);
    --shadow-lg: 0 20px 50px rgba(15, 35, 70, .14);
    --max: 1180px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  h1, h2, h3, h4 { line-height: 1.2; margin: 0 0 .5em; letter-spacing: -.02em; }
  h1 { font-size: clamp(2.2rem, 5.5vw, 3.8rem); font-weight: 800; }
  h2 { font-size: clamp(1.7rem, 3.6vw, 2.5rem); font-weight: 800; }
  h3 { font-size: 1.2rem; font-weight: 700; }
  p  { margin: 0 0 1em; color: var(--ink-soft); }
  .container { max-width: var(--max); margin: 0 auto; padding: 0 24px; }
  section { padding: 88px 0; }
</style>
</head>
